<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Profile - LearnEase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f6fa;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* Sidebar */
.sidebar{
width:220px;
background:#34495e;
color:white;
height:100vh;
position:fixed;
left:0;
top:0;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 20px;
margin:5px 10px;
border-radius:8px;
}

.sidebar a:hover{
background:#2c3e50;
}

/* Main Content */
.main{
margin-left:220px;
padding:30px;
}

/* Profile Layout */
.profile-container{
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* Profile Card */
.profile-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

.profile-card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

.profile-card h3{
margin:5px 0;
}

.profile-card p{
color:gray;
}

/* Form Section */
.profile-form{
flex:1;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile-form h2{
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
font-weight:500;
}

.form-group input,
.form-group textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.save-btn{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#2980b9,#3498db);
color:white;
font-weight:600;
cursor:pointer;
}

.save-btn:hover{
opacity:0.9;
}

/* Stats */
.stats{
display:flex;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.stat-card{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

/* Footer */
footer{
background:#263238;
color:white;
text-align:center;
padding:12px;
margin-top:auto;
}

/* Responsive */
@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
display:flex;
justify-content:space-around;
}

.main{
margin-left:0;
}

.profile-container{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>LearnEase</h2>
<a href="teacher-dashboard.html">Dashboard</a>
<a href="#">Profile</a>
<a href="#">My Courses</a>
<a href="#">Assignments</a>
<a href="#">Student Progress</a>
<a href="login.html">Logout</a>
</div>

<!-- Main -->
<div class="main">

<div class="profile-container">

<!-- Profile Card -->
<div class="profile-card">
<img src="https://via.placeholder.com/120" alt="Profile">
<h3 id="nameDisplay">Instructor Name</h3>
<p id="emailDisplay">instructor@email.com</p>
<p>Web Development Instructor</p>
</div>

<!-- Profile Form -->
<div class="profile-form">
<h2>Edit Profile</h2>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Qualification</label>
<input type="text" id="qualification">
</div>

<div class="form-group">
<label>Experience</label>
<input type="text" id="experience">
</div>

<div class="form-group">
<label>Bio</label>
<textarea rows="3" id="bio"></textarea>
</div>

<button class="save-btn" onclick="saveProfile()">Save Changes</button>

</div>

</div>

<!-- Stats -->
<div class="stats">

<div class="stat-card">
<h3>5</h3>
<p>Total Courses</p>
</div>

<div class="stat-card">
<h3>120</h3>
<p>Total Students</p>
</div>

<div class="stat-card">
<h3>85</h3>
<p>Assignments Checked</p>
</div>

</div>

</div>

<footer>
© 2026 LearnEase | Instructor Profile
</footer>

<script>

/* Load saved profile */
window.onload = function(){

let profile = JSON.parse(localStorage.getItem("instructorProfile"));

if(profile){

document.getElementById("name").value = profile.name;
document.getElementById("email").value = profile.email;
document.getElementById("phone").value = profile.phone;
document.getElementById("qualification").value = profile.qualification;
document.getElementById("experience").value = profile.experience;
document.getElementById("bio").value = profile.bio;

document.getElementById("nameDisplay").innerText = profile.name;
document.getElementById("emailDisplay").innerText = profile.email;

}

}

/* Save profile */
function saveProfile(){

let profile = {

name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
qualification: document.getElementById("qualification").value,
experience: document.getElementById("experience").value,
bio: document.getElementById("bio").value

};

localStorage.setItem("instructorProfile", JSON.stringify(profile));

alert("Profile Updated Successfully");

location.reload();

}

</script>

</body>
</html>
