<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Courses - LearnEase</title>

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(-45deg,#e3f2fd,#bbdefb,#e1f5fe,#f5faff);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:white;
text-align:center;
padding:15px;
font-size:1.6rem;
}
.container{padding:30px;max-width:1100px;margin:auto;}
.grid{display:flex;flex-wrap:wrap;gap:25px;}
.card{
width:300px;
padding:20px;
border-radius:18px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.title{font-size:1.3rem;color:#0d47a1;}
.desc{font-size:0.9rem;color:#555;}
.btn{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>My Courses</header>

<div class="container">
  <div class="grid" id="myCourses"></div>
</div>

<script>

async function loadMyCourses() {
  try {

    const res = await fetch('/api/course/enrolled', {
      credentials: "include" 
    });

    const courses = await res.json();

    const container = document.getElementById("myCourses");
    container.innerHTML = "";

    if (!courses || courses.length === 0) {
      container.innerHTML = "<p>No enrolled courses</p>";
      return;
    }

    courses.forEach(course => {

      const progress = Math.floor(Math.random() * 100);

      const div = document.createElement("div");
      div.classList.add("card");

      div.innerHTML = `
        <div class="title">${course.course_name}</div>
        <div class="desc">${course.description}</div>

        <small>Progress: ${progress}%</small>

        <button onclick="openCourse(${course.course_id})" class="btn">
          View Course
        </button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error:", err);
  }
}

function openCourse(id){
  window.location.href = `/course-material.html?courseId=${id}`;
}

loadMyCourses();

</script>

</body>
</html>
