<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - LearnEase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(to right, #e3f2fd, #f8fbff);
    font-family: 'Poppins', sans-serif;
}

.navbar{
    background-color: #0d47a1 !important;
}

.contact-card{
    background: #ffffff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2{
    color: #1565c0;
    font-weight: 700;
}

.btn-primary{
    background-color: #1565c0;
    border: none;
}

.btn-primary:hover{
    background-color: #0d47a1;
}

footer{
    background-color: #0d47a1;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">LearnEase</a>
</div>
</nav>

<div class="container my-5">
<h2 class="text-center mb-4">Contact Us</h2>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="contact-card">

<div id="successMsg" class="alert alert-success d-none">
Message Sent Successfully!
</div>

<form action="/api/contact" method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Message</label>
<textarea name="message" class="form-control" rows="4" required></textarea>
</div>

<button class="btn btn-primary w-100">Send Message</button>

</form>

<div class="mt-4 text-center">
<p>Email: support@learnease.com</p>
<p>Phone: +91 9876543210</p>
</div>

</div>

</div>
</div>
</div>

<footer class="text-white text-center p-3 mt-5">
© 2026 LearnEase
</footer>

<script>
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('success')){
    document.getElementById('successMsg').classList.remove('d-none');
}
</script>

</body>
</html>
