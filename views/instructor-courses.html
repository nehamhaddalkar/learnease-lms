<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Course - LearnEase</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#e3f2fd;
}

header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:15px;
    font-size:1.6rem;
}

.container{
    padding:30px;
    max-width:1000px;
    margin:auto;
}

.course-card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

.course-title{
    font-size:1.5rem;
    color:#0d47a1;
    margin-bottom:10px;
}

.section{
    margin-top:20px;
}

.section h3{
    color:#1976d2;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'Poppins';
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0d47a1;
}

.item {
    margin:5px 0;
    padding:5px;
    background:#f1f8ff;
    border-radius:6px;
}

@media(max-width:768px){
    .container{
        padding:15px;
    }

    header{
        font-size:1.2rem;
    }
}
</style>
</head>

<body>

<header>LearnEase - Manage Courses</header>

<div class="container">

<!-- 🔥 Dynamic Courses -->
<div id="coursesContainer"></div>

<a href="/instructor-dashboard.html">⬅ Back to Dashboard</a>

</div>

<script>

// 🔥 Store lessons per course (frontend temporary)
let lessonsMap = {}; 

// ✅ INIT COURSES UI
function initCourses(courses){
    const container = document.getElementById("coursesContainer");
    container.innerHTML = ""; // clear old data

    if(!courses || courses.length === 0){
        container.innerHTML = "<p>No courses assigned</p>";
        return;
    }

    courses.forEach(course => {

        lessonsMap[course.course_id] = [];

        const div = document.createElement("div");
        div.classList.add("course-card");

        div.innerHTML = `
            <div class="course-title">${course.course_name}</div>
            <p>${course.description}</p>

            <div class="section">
                <h3>Add Lesson</h3>

                <input type="text" id="title-${course.course_id}" placeholder="Lesson Title">
                <textarea id="notes-${course.course_id}" placeholder="Lesson Notes"></textarea>
                <label for="file-${course.course_id}">Choose File (PDF/Doc):</label>
                <input type="file" id="file-${course.course_id}">

                <button onclick="addLesson(${course.course_id})">Add Lesson</button>

                <div class="list" id="lessonList-${course.course_id}"></div>
            </div>
        `;

        container.appendChild(div);
    });
}

// ✅ FETCH REAL COURSES FROM BACKEND
async function fetchInstructorCourses() {
    try {
        // 🔥 Replace with actual logged-in instructor ID
        const instructorId = localStorage.getItem("userId") || 1;

        const res = await fetch(`/api/course/instructor`);
        const courses = await res.json();

        console.log("Courses from DB:", courses);

        initCourses(courses);
    } catch (error) {
        console.error("Error fetching courses:", error);
    }
}

// 🔥 Add lesson (frontend only for now)
function addLesson(courseId){
    const title = document.getElementById(`title-${courseId}`).value;
    const notes = document.getElementById(`notes-${courseId}`).value;
    const fileInput = document.getElementById(`file-${courseId}`);
    const file = fileInput.files[0];

    if(!title){
        alert("Enter lesson title");
        return;
    }

    lessonsMap[courseId].push({
        title,
        notes,
        fileName: file ? file.name : null
    });

    displayLessons(courseId);

    document.getElementById(`title-${courseId}`).value = "";
    document.getElementById(`notes-${courseId}`).value = "";
    fileInput.value = "";
}

// 🔥 Display lessons
function displayLessons(courseId){
    const list = document.getElementById(`lessonList-${courseId}`);
    list.innerHTML = "";

    lessonsMap[courseId].forEach(l => {
        let fileText = l.fileName ? `📎 ${l.fileName}` : "";
        list.innerHTML += `
            <div class="item">📘 ${l.title} ${fileText}</div>
        `;
    });
}

// 🚀 LOAD COURSES
fetchInstructorCourses();

</script>

</body>
</html>
