<script>

const backendURL = "http://localhost:5000/admin/api";

/* ================= FETCH PENDING USERS ================= */

async function fetchPendingUsers() {

    try {

        const res = await fetch(`${backendURL}/pending-users`);
        const users = await res.json();

        const tbody = document.querySelector("#pending-users tbody");
        tbody.innerHTML = "";

        if(users.length === 0){
            tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center text-muted">
                No pending users 🎉
                </td>
            </tr>`;
            return;
        }

        users.forEach(u => {

            tbody.innerHTML += `
            <tr>

                <td>${u.user_id}</td>

                <td>${u.full_name}</td>

                <td>${u.email}</td>

                <td>
                    <select class="form-select form-select-sm" id="role-${u.user_id}">

                        <option value="">Select role</option>

                        <option value="student"
                        ${u.role === "student" ? "selected" : ""}>
                        Student
                        </option>

                        <option value="instructor"
                        ${u.role === "instructor" ? "selected" : ""}>
                        Instructor
                        </option>

                    </select>
                </td>

                <td>

                    <button class="btn btn-success btn-sm me-1"
                    onclick="approveUser(${u.user_id})">
                    Approve
                    </button>

                    <button class="btn btn-danger btn-sm"
                    onclick="deleteUser(${u.user_id})">
                    Delete
                    </button>

                </td>

            </tr>
            `;

        });

    } catch(err){

        console.error("Error fetching users:", err);

    }

}


/* ================= APPROVE USER ================= */

async function approveUser(userId) {

    const roleSelect = document.getElementById(`role-${userId}`);
    const role = roleSelect.value;

    if(!role){

        alert("⚠️ Please select role first!");

        return;
    }

    try {

        const res = await fetch(`${backendURL}/approve-user`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                userId,
                role
            })

        });

        const data = await res.json();

        alert(data.message || "✅ User approved successfully!");

        fetchPendingUsers();

    } catch(err){

        console.error("Approve error:", err);

        alert("❌ Failed to approve user");

    }

}


/* ================= DELETE USER ================= */

async function deleteUser(userId){

    const confirmDelete = confirm("Are you sure you want to delete this user?");

    if(!confirmDelete) return;

    try {

        const res = await fetch(`${backendURL}/delete-user/${userId}`, {

            method: "DELETE"

        });

        const data = await res.json();

        alert(data.message || "🗑️ User deleted successfully!");

        fetchPendingUsers();

    } catch(err){

        console.error("Delete error:", err);

        alert("❌ Failed to delete user");

    }

}


/* ================= LOAD USERS ================= */

fetchPendingUsers();

</script>
