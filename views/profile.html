<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - LearnEase</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background: linear-gradient(135deg,#e3f2fd,#f5f9ff);
    padding-top:100px;
}

/* Header */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:20px;
    text-align:center;
    font-size:1.8rem;
    font-weight:600;
    background:rgba(25,118,210,0.9);
    color:white;
    backdrop-filter:blur(10px);
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    z-index:1000;
}

/* Profile card */
.profile-card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:50px 30px;
    max-width:400px;
    width:90%;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    position:relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.profile-card:hover{
    transform: translateY(-5px);
    box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

/* Profile photo */
.photo-wrapper{
    position:relative;
    width:140px;
    height:140px;
    margin:auto;
    margin-bottom:20px;
}

.profile-photo{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #1976d2;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.profile-photo:hover{
    transform: scale(1.05);
    box-shadow:0 10px 25px rgba(25,118,210,0.4);
}

/* Camera icon */
.camera-icon{
    position:absolute;
    bottom:0;
    right:0;
    background:#1976d2;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:0.3s;
}

.camera-icon:hover{
    background:#0d47a1;
    transform: scale(1.1);
}

.camera-icon svg{
    width:22px;
    height:22px;
    fill:white;
}

/* Info fields */
.info-field{
    background:rgba(255,255,255,0.6);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    text-align:left;
    font-weight:500;
    transition:0.3s;
}

.info-field input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-size:1rem;
    font-weight:500;
}

.info-field input:focus{
    color:#0d47a1;
}

/* Buttons */
button{
    padding:12px 25px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
    margin:10px 5px;
}

#editProfileBtn{
    background:#1976d2;
    color:white;
}

#editProfileBtn:hover{
    background:#0d47a1;
    transform: scale(1.05);
}

#saveBtn{
    background:#42a5f5;
    color:white;
    display:none;
}

#saveBtn:hover{
    background:#1e88e5;
    transform: scale(1.05);
}

#cancelBtn{
    background:#f44336;
    color:white;
    display:none;
}

#cancelBtn:hover{
    background:#d32f2f;
    transform: scale(1.05);
}

/* Hide file input */
#photoInput{
    display:none;
}

/* Responsive */
@media(max-width:480px){
    .profile-card{padding:40px 20px;}
}
</style>
</head>
<body>

<header>LearnEase - My Profile</header>

<div class="profile-card">
    <div class="photo-wrapper">
        <img src="https://via.placeholder.com/140" id="profilePhoto" class="profile-photo" alt="Profile Photo">
        <div class="camera-icon" onclick="document.getElementById('photoInput').click();">
            <svg viewBox="0 0 24 24"><path d="M12 5c-3.86 0-7 3.14-7 7s3.14 7 7 7 7-3.14 7-7-3.14-7-7-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm-6-7c0-.55.45-1 1-1h2v-2c0-.55.45-1 1-1h4c.55 0 1 .45 1 1v2h2c.55 0 1 .45 1 1v0c0 .55-.45 1-1 1h-2v2c0 .55-.45 1-1 1h-4c-.55 0-1-.45-1-1v-2H7c-.55 0-1-.45-1-1v0z"/></svg>
        </div>
    </div>
    <input type="file" id="photoInput">

    <div class="info-field"><input type="text" id="name" readonly placeholder="Full Name"></div>
    <div class="info-field"><input type="email" id="email" readonly placeholder="Email"></div>
    <div class="info-field"><input type="text" id="role" readonly placeholder="Role"></div>

    <div>
        <button id="editProfileBtn">Edit Profile</button>
        <button id="saveBtn">Save</button>
        <button id="cancelBtn">Cancel</button>
    </div>
</div>

<script>
// Logged-in user profile load
function loadProfile(){
    fetch("/api/user/profile",{credentials:"include"})
    .then(res=>{ if(!res.ok) throw new Error("Failed to fetch profile"); return res.json(); })
    .then(user=>{
        document.getElementById("name").value = user.name;
        document.getElementById("email").value = user.email;
        document.getElementById("role").value = user.role;
        if(user.photo) document.getElementById("profilePhoto").src = user.photo;
    })
    .catch(err=>{ console.error(err); alert("Error fetching profile. Please login again."); });
}

let originalData = {};

// Edit toggle
document.getElementById("editProfileBtn").addEventListener("click", ()=>{
    originalData.name = document.getElementById("name").value;
    originalData.email = document.getElementById("email").value;
    originalData.role = document.getElementById("role").value;

    document.getElementById("name").removeAttribute("readonly");
    document.getElementById("email").removeAttribute("readonly");
    document.getElementById("role").removeAttribute("readonly");

    document.getElementById("editProfileBtn").style.display="none";
    document.getElementById("saveBtn").style.display="inline-block";
    document.getElementById("cancelBtn").style.display="inline-block";
});

// Cancel edit
document.getElementById("cancelBtn").addEventListener("click", ()=>{
    document.getElementById("name").value = originalData.name;
    document.getElementById("email").value = originalData.email;
    document.getElementById("role").value = originalData.role;

    document.getElementById("name").setAttribute("readonly", true);
    document.getElementById("email").setAttribute("readonly", true);
    document.getElementById("role").setAttribute("readonly", true);

    document.getElementById("saveBtn").style.display="none";
    document.getElementById("cancelBtn").style.display="none";
    document.getElementById("editProfileBtn").style.display="inline-block";
});

// Save changes
document.getElementById("saveBtn").addEventListener("click", ()=>{
    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;
    const role=document.getElementById("role").value;

    fetch("/api/user/profile",{
        method:"PUT",
        credentials:"include",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,email,role})
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Profile updated!");
        document.getElementById("name").setAttribute("readonly", true);
        document.getElementById("email").setAttribute("readonly", true);
        document.getElementById("role").setAttribute("readonly", true);

        document.getElementById("saveBtn").style.display="none";
        document.getElementById("cancelBtn").style.display="none";
        document.getElementById("editProfileBtn").style.display="inline-block";
    })
    .catch(err=>console.error(err));
});

// Profile photo preview
document.getElementById("photoInput").addEventListener("change", e=>{
    const file=e.target.files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=()=>document.getElementById("profilePhoto").src=reader.result;
        reader.readAsDataURL(file);
    }
});

// Init
loadProfile();
</script>

</body>
</html>
