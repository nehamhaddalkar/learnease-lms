
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Courses - LearnEase</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark" style="background:#1976d2;">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold">LearnEase</span>
  </div>
</nav>

<main class="container my-5">
  <div class="row g-4" id="coursesContainer"></div>
</main>

<footer class="text-white text-center py-3 mt-5" style="background:#1976d2;">
  <p>&copy; 2026 LearnEase</p>
</footer>

<script>
async function fetchCourses() {
  try {
    const res = await fetch('/api/course');
    const courses = await res.json();
    const container = document.getElementById("coursesContainer");
    container.innerHTML = "";

    if (!courses.length) {
      container.innerHTML = "<p>No courses found</p>";
      return;
    }

    courses.forEach(course => {
      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h4>${course.course_name}</h4>
            <p><b>Category:</b> ${course.category || "N/A"}</p>
            <p><b>Duration:</b> ${course.duration || "N/A"} weeks</p>
            <p class="text-muted">${course.description}</p>
            <button class="btn btn-primary w-100 enroll-btn" data-id="${course.course_id}">
              Enroll Now
            </button>
          </div>
        </div>
      `;

      container.appendChild(col);
    });

    // Add click listeners
    document.querySelectorAll(".enroll-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const courseId = btn.getAttribute("data-id");

        try {
          const res = await fetch('/api/course/enroll', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ courseId }) // ✅ only courseId
          });

          const data = await res.json();
          alert(data.message);

          if(res.status === 200){
            btn.innerText = "Enrolled";
            btn.disabled = true;
            btn.classList.remove("btn-primary");
            btn.classList.add("btn-success");

            setTimeout(() => window.location.href = "/my-courses.html", 500);
          }

        } catch(err){
          console.error("Enroll error:", err);
        }
      });
    });

  } catch(err) {
    console.error("Fetch courses error:", err);
  }
}

fetchCourses();
</script>

</body>
</html>
