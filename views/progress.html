<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Progress - LearnEase</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#e3f2fd,#f5f9ff);
}

/* Header */
header{
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    color:white;
    text-align:center;
    padding:15px;
    font-size:1.7rem;
}

/* Container */
.container{
    padding:30px;
    max-width:1000px;
    margin:auto;
}

/* Progress Cards */
.progress-card{
    background:white;
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.progress-card:hover{
    transform:translateY(-5px);
}

/* Course Title */
.course-title{
    font-size:1.4rem;
    color:#0d47a1;
    margin-bottom:10px;
}

/* Progress Bar */
.progress-bar-container{
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    height:22px;
    margin:10px 0;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#1976d2,#42a5f5);
    text-align:center;
    color:white;
    font-size:0.8rem;
    line-height:22px;
    transition:0.4s;
}

/* Result */
.result{
    margin-top:10px;
    font-weight:600;
}

/* Back button */
.back{
    margin:30px 0;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:#1976d2;
    font-weight:500;
}

/* Loader */
.loader{
    text-align:center;
    font-size:1.2rem;
    color:#555;
}
</style>
</head>

<body>

<header>LearnEase - My Progress</header>

<div class="container" id="progressContainer">
<div class="loader">Loading progress...</div>
</div>

<div class="back">
<a href="/student-dashboard.html">⬅ Back to Dashboard</a>
</div>

<script>

async function loadProgress(){

const container = document.getElementById("progressContainer");

try{

// ✅ 1. Get enrolled courses
const courseRes = await fetch("/api/course/enrolled", {
credentials:"include"
});

const courses = await courseRes.json();

if(!courses || courses.length === 0){
container.innerHTML = "<p>No enrolled courses ❌</p>";
return;
}

container.innerHTML = "";

// ✅ 2. Loop each course
for(const course of courses){

// 🔥 3. Get progress for each course
const progressRes = await fetch(`/api/progress/${course.course_id}`,{
credentials:"include"
});

const progress = await progressRes.json();

const completion = progress.completion || 0;
const submitted = progress.assignmentsSubmitted || 0;
const total = progress.totalAssignments || 0;
const result = progress.result || "Pending";

// 🎨 Color based on progress
let color = "#e74c3c";
if(completion >= 80) color = "#2ecc71";
else if(completion >= 50) color = "#f39c12";

// ✅ 4. Render card
container.innerHTML += `
<div class="progress-card">

<div class="course-title">${course.course_name}</div>

<p>Course Completion</p>

<div class="progress-bar-container">
<div class="progress-bar" style="width:${completion}%; background:${color}">
${completion}%
</div>
</div>

<p>Assignments Submitted:
${submitted}/${total}
</p>

<p class="result">Result: ${result}</p>

</div>
`;

}

}catch(err){
console.error(err);
container.innerHTML = "<p>Error loading progress ❌</p>";
}

}

// 🚀 Load on page open
loadProgress();

</script>

</body>
</html>
