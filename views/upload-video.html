<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Video + Quiz - LearnEase</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#e3f2fd,#f5f9ff);
}

header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:#fff;
text-align:center;
padding:15px;
font-size:1.6rem;
font-weight:600;
}

.container{
max-width:700px;
margin:80px auto;
padding:25px;
background:#fff;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{text-align:center;color:#1976d2;}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

.upload-btn{
width:100%;
background:#1976d2;
color:white;
margin-top:10px;
}

.add-btn{
background:#2ecc71;
color:white;
margin-top:10px;
}

.remove-btn{
background:#e74c3c;
color:white;
margin-top:10px;
}

.quiz-box{
background:#f4f8ff;
padding:15px;
border-radius:12px;
margin-top:15px;
border-left:4px solid #1976d2;
}
</style>
</head>

<body>

<header>Upload Video + Quiz</header>

<div class="container">
<h2>Upload Video & Add Quiz</h2>

<form id="videoUploadForm">

<label>Course:</label>
<select id="videoCourseSelect" required></select>

<label>Video Title:</label>
<input type="text" id="videoTitle" required>

<label>Video File:</label>
<input type="file" id="videoFile" accept="video/*" required>

<hr>

<h3>Quiz Questions</h3>

<div id="quizContainer"></div>

<button type="button" class="add-btn" onclick="addQuestion()">➕ Add Question</button>

<button type="submit" class="upload-btn">Upload Video + Quiz</button>

</form>
</div>

<script>

// =====================
// 🔥 LOAD COURSES (FIXED)
// =====================
async function loadInstructorCourses(){
  const select = document.getElementById("videoCourseSelect");
  select.innerHTML = "<option>Loading courses...</option>";

 try {

  const res = await fetch("/api/course/instructor", {
    credentials: "include"
  });

  if (!res.ok) {
    throw new Error("Course API not working");
  }

  const courses = await res.json();
  console.log("COURSES:", courses);

  select.innerHTML = "";

  if (courses.length === 0) {
    select.innerHTML = "<option>No courses assigned</option>";
    return;
  }

  courses.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.course_id;
    opt.innerText = c.course_name; // 🔥 IMPORTANT FIX
    select.appendChild(opt);
  });

} catch (err) {
  console.error("Error loading courses:", err);
  select.innerHTML = "<option>Error loading courses</option>";
}}

loadInstructorCourses();


// =====================
// ➕ MULTIPLE QUESTIONS
// =====================
let questionCount = 0;

function addQuestion(){
  questionCount++;

  const div = document.createElement("div");
  div.classList.add("quiz-box");
  div.setAttribute("data-id", questionCount);

  div.innerHTML = `
    <label>Question:</label>
    <input type="text" class="question" required>

    <label>Options:</label>
    <input type="text" class="options" placeholder="Option A,Option B,Option C,Option D" required>

    <label>Correct Option (A/B/C/D):</label>
    <input type="text" class="correct" maxlength="1" required>

    <button type="button" class="remove-btn" onclick="removeQuestion(${questionCount})">❌ Remove</button>
  `;

  document.getElementById("quizContainer").appendChild(div);
}

function removeQuestion(id){
  const el = document.querySelector(`[data-id='${id}']`);
  if(el) el.remove();
}


// =====================
// 📤 SUBMIT
// =====================
document.getElementById("videoUploadForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const courseId = document.getElementById("videoCourseSelect").value;
  const title = document.getElementById("videoTitle").value;
  const file = document.getElementById("videoFile").files[0];

  const questions = document.querySelectorAll(".quiz-box");

  if(questions.length === 0){
    alert("Add at least one question ❌");
    return;
  }

  const quizData = [];

  questions.forEach(q=>{
    const question = q.querySelector(".question").value;
    const options = q.querySelector(".options").value.split(",");
    const correct = q.querySelector(".correct").value.toUpperCase();

    quizData.push({question, options, correct_option: correct});
  });

  const formData = new FormData();
  formData.append("video", file);
  formData.append("course_id", courseId);
  formData.append("title", title);
  formData.append("created_by", 1); // optional: backend se handle karo

  try{
    // 🎬 Upload video
    const uploadRes = await fetch("/api/video/upload",{
      method:"POST",
      body:formData
    });

    const uploadData = await uploadRes.json();
    console.log("VIDEO:", uploadData);

    if(!uploadData.video_id){
      alert("Video upload failed ❌");
      return;
    }

    const videoId = uploadData.video_id;

    // 🧠 Upload quiz
    const quizRes = await fetch(`/api/video/${videoId}/quiz`,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({questions: quizData})
    });

    const quizDataRes = await quizRes.json();
    console.log("QUIZ:", quizDataRes);

    alert("Video + Multiple Quiz Uploaded ✅");

    // reset
    document.getElementById("videoUploadForm").reset();
    document.getElementById("quizContainer").innerHTML="";

  }catch(err){
    console.error("❌ Upload error:", err);
    alert("Upload failed ❌");
  }

});

</script>

</body>
</html>
