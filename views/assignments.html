<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Assignment - LearnEase</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#e3f2fd;
}

header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:15px;
    font-size:1.7rem;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 6px 12px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0d47a1;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'Poppins';
    font-size:0.95rem;
}

textarea{
    resize:none;
}

input[type="file"]{
    padding:8px;
}

button{
    width:100%;
    padding:14px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:1rem;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.back-btn{
    margin-top:20px;
    text-align:center;
}

.back-btn a{
    text-decoration:none;
    color:#1976d2;
    font-weight:500;
}
</style>
</head>

<body>

<header>LearnEase-Assignment</header>

<div class="container">

<h2>Upload Assignment</h2>

<form id="assignmentForm" enctype="multipart/form-data">

    <!-- 🔥 IMPORTANT HIDDEN FIELDS -->
    <!-- <input type="hidden" name="assignment_id" value="1"> -->
    <input type="hidden" name="assignment_id" value="5">
    <input type="hidden" name="student_id" value="1">

    <!-- ENROLLED COURSES -->
    <div class="form-group">
        <label>Select Course</label>
        <select name="courseId" id="courseDropdown" required>
            <option value="">Loading courses...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Assignment Title</label>
        <input type="text" name="title" required>
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4"></textarea>
    </div>

    <div class="form-group">
        <label>Upload File</label>
        <input type="file" name="file" required>
    </div>

    <button type="submit">Submit Assignment</button>

</form>

<div class="back-btn">
    <a href="/student-dashboard.html">⬅ Back to Dashboard</a>
</div>

</div>

<script>

// ✅ LOAD ENROLLED COURSES
async function loadCoursesDropdown(){
    try{
        const res = await fetch('/api/course/enrolled', {
            credentials: "include"
        });

        const courses = await res.json();

        const dropdown = document.getElementById("courseDropdown");
        dropdown.innerHTML = "<option value=''>Choose Course</option>";

        if(!courses || courses.length === 0){
            dropdown.innerHTML = "<option>No enrolled courses</option>";
            return;
        }

        courses.forEach(course => {
            const option = document.createElement("option");
            option.value = course.course_id;
            option.textContent = course.course_name;
            dropdown.appendChild(option);
        });

    }catch(err){
        console.error("Dropdown error:", err);
        document.getElementById("courseDropdown").innerHTML =
            "<option>Error loading courses</option>";
    }
}

loadCoursesDropdown();


// ✅ SUBMIT FORM
document.getElementById("assignmentForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const formData = new FormData(e.target);

    try{
        const res = await fetch("/api/assignments/upload", {
            method:"POST",
            body:formData,
            credentials:"include"
        });

        const data = await res.json();
        alert(data.message);

    }catch(err){
        console.error("UPLOAD ERROR:", err);

  if(err.response){
    const text = await err.response.text();
    console.log("SERVER ERROR:", text);
  }

  alert("Upload failed ❌. (check console)");
    }
});

</script>

</body>
</html>
