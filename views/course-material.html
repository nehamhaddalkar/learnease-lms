<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Material</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#e3f2fd;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    text-align:center;
    font-size:1.5rem;
}

.container{
    padding:40px;
    max-width:900px;
    margin:auto;
}

.section{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0 6px 12px rgba(0,0,0,0.1);
}

video{
    width:100%;
    border-radius:10px;
}

/* PDF Button */
.pdf-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 15px;
    background:#1976d2;
    color:white;
    border-radius:6px;
    text-decoration:none;
    transition:0.3s;
}

.pdf-btn:hover{
    background:#0d47a1;
}

/* Quiz Modal */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<header>LearnEase-Course Material</header>

<div class="container">

<!-- VIDEO SECTION -->
<div class="section">
<h2>Module 1: Introduction</h2>

<video id="lessonVideo" controls>
    <source src="sample-video.mp4" type="video/mp4">
</video>
</div>

<!-- PDF SECTION -->
<div class="section">
<h2>Study Material (PDF)</h2>
<p>Download module notes below:</p>

<a href="sample-notes.pdf" target="_blank" class="pdf-btn">
Download PDF
</a>
</div>

</div>

<!-- QUIZ MODAL -->
<div class="modal" id="quizModal">
    <div class="modal-content">
        <h3>Quick Quiz</h3>
        <p>What is HTML?</p>

        <input type="radio" name="q1" value="wrong"> A Programming Language<br>
        <input type="radio" name="q1" value="correct"> A Markup Language<br>
        <input type="radio" name="q1" value="wrong"> A Database<br>

        <br>
        <button onclick="submitQuiz()">Submit</button>
        <p id="quizMsg"></p>
    </div>
</div>

<script>

const video = document.getElementById("lessonVideo");
const modal = document.getElementById("quizModal");

let quizShown = false;

video.addEventListener("timeupdate", function(){
    if(video.currentTime >= 20 && !quizShown){
        video.pause();
        modal.style.display = "flex";
        quizShown = true;
    }
});

function submitQuiz(){

    const answers = document.getElementsByName("q1");
    let selected = "";

    for(let i=0;i<answers.length;i++){
        if(answers[i].checked){
            selected = answers[i].value;
        }
    }

    if(selected === "correct"){
        document.getElementById("quizMsg").innerText = "Correct! Video continuing...";
        setTimeout(()=>{
            modal.style.display="none";
            video.play();
        },1000);
    }else{
        document.getElementById("quizMsg").innerText = "Wrong answer. Try again!";
    }
}

</script>

</body>
</html>
